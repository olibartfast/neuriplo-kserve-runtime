apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: neuriplo-kserve-runtime
spec:
  supportedModelFormats:
    - name: neuriplo
      version: "1"
      autoSelect: false
  protocolVersions:
    - v2
  containers:
    - name: kserve-container
      image: neuriplo-kserve-runtime:latest
      imagePullPolicy: IfNotPresent
      args:
        - --host
        - "0.0.0.0"
        - --port
        - "8080"
        - --model-name
        - "{{.Name}}"
        - --model-version
        - "1"
      env:
        - name: MODEL_PATH
          value: /mnt/models
        - name: BACKEND
          value: stub
        - name: PROTOCOL
          value: v2
        - name: DEPLOYMENT
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app.kubernetes.io/component']
      ports:
        - containerPort: 8080
          protocol: TCP
      readinessProbe:
        httpGet:
          path: /v2/health/ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3
      livenessProbe:
        httpGet:
          path: /v2/health/live
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 30
        failureThreshold: 3
      startupProbe:
        httpGet:
          path: /v2/health/live
          port: 8080
        initialDelaySeconds: 0
        periodSeconds: 2
        failureThreshold: 30
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi